<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Datapack Sandbox</title>
  <desc id="desc">Test Minecraft Java datapacks without starting a server.</desc>
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(885 145) rotate(130) scale(560 430)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1BC98A" stop-opacity=".34"/>
      <stop offset="1" stop-color="#07120F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#9CFFBE" stroke-opacity=".055"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" rx="36" fill="#07120F"/>
  <rect width="1200" height="630" rx="36" fill="url(#glow)"/>
  <rect width="1200" height="630" rx="36" fill="url(#grid)"/>
  <image href="datapack-sandbox-mark.svg" x="760" y="110" width="320" height="320"/>
  <text x="92" y="186" fill="#65F5B6" font-family="ui-monospace, monospace" font-size="26" font-weight="700" letter-spacing="3">CLEAN-ROOM DATAPACK RUNTIME</text>
  <text x="88" y="286" fill="#F2FFF8" font-family="system-ui, sans-serif" font-size="72" font-weight="760">Datapack Sandbox</text>
  <text x="92" y="355" fill="#B5C9BF" font-family="system-ui, sans-serif" font-size="31">Run commands. Assert state. Ship datapacks with confidence.</text>
  <rect x="92" y="430" width="515" height="92" rx="14" fill="#0C1B16" stroke="#2ACB91" stroke-opacity=".5"/>
  <text x="126" y="487" fill="#DFFFF0" font-family="ui-monospace, monospace" font-size="27">$ dps check --strict examples</text>
</svg>
