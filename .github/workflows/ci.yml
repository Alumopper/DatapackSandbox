name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Run checks
        if: runner.os != 'Windows'
        run: ./gradlew check

      - name: Run checks
        if: runner.os == 'Windows'
        run: .\gradlew.bat check
