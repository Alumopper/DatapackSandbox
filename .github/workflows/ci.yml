name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jvm:
    name: JVM release gate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked Node dependencies
        run: npm ci

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify release
        shell: bash
        run: ./gradlew releaseCheck

  schema-reproducibility:
    name: Reproduce pinned vanilla schema
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Regenerate and compare schema
        run: ./gradlew :schema-generator:checkGeneratedVanillaNbtSchemas

  vscode:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build bundled CLI
        run: ./gradlew :cli:fatJar

      - name: Install extension dependencies
        working-directory: vscode
        run: npm ci

      - name: Compile and test extension
        working-directory: vscode
        run: npm test

      - name: Verify extension packaging inputs
        working-directory: vscode
        run: npm run vscode:prepublish

  jupyter:
    name: Jupyter Kernel
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: jupyter/pyproject.toml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Kernel build and test dependencies
        run: python -m pip install -e "./jupyter[test]"

      - name: Build bundled CLI and run Kernel tests
        shell: bash
        run: ./gradlew prepareJupyterKernel jupyterKernelTest

      - name: Build and verify Python distributions
        working-directory: jupyter
        run: |
          python -m build
          python -m twine check dist/*

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build
